name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e "backend[dev]"
      - name: Test
        # Live-provider tests are excluded by pytest addopts; the suite is
        # fully stubbed and deterministic, so it runs on every push.
        run: pytest
        working-directory: backend

  e2e:
    # The dashboard gate runs against the REAL stack — uvicorn serving the
    # actual gate plus the Next dev server — still deterministic: structured
    # samples, in-memory store, no LLM anywhere in the path.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        run: pip install -e "backend[server]"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        run: npm ci
        working-directory: frontend
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Dashboard e2e
        run: npx playwright test
        working-directory: frontend
        env:
          E2E_BACKEND_COMMAND: python -m uvicorn agentgate.main:app --port 8731

  package:
    # Packaging gate, kept enforced: a CLEAN install (no source tree on the
    # path) must import, decide, and expose the MCP tool + console script —
    # this is what catches an unshipped data file like the default policy.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install into a clean venv
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install "./backend[mcp]"
      - name: Verify from the installed package only
        working-directory: /tmp
        run: |
          /tmp/venv/bin/python -c "from agentgate.mcp.server import verify_action; d = verify_action({'action_type':'approve_payment','invoice_number':'I-1','amount':{'value':'5.00','currency':'USD'},'vendor':'A'}, {'invoice':{'invoice_number':'I-1','vendor':'A','date':'2026-01-01','currency':'USD','line_items':[{'description':'w','quantity':'1','unit_price':{'value':'5.00','currency':'USD'},'amount':{'value':'5.00','currency':'USD'},'kind':'charge'}],'total':{'value':'5.00','currency':'USD'}}}); assert d['decision'] == 'allow', d; print('installed package verifies:', d['decision'])"
          test -x /tmp/venv/bin/agentgate-mcp
