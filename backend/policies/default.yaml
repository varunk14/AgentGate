# AgentGate policy — typed thresholds applied WITHIN the decision precedence
# (BLOCK > ESCALATE > ALLOW). Policy may only ADD escalations; it can never open
# or weaken the deterministic gate (fail-closed; DECISIONS D28). All numbers are
# parsed to Decimal, never float (D1).
escalate_if:
  amount_greater_than: 10000   # action amounts above this route to a human
  score_below: 0.80            # grounding-coverage score below this routes to a human

# Asserted spec/code drift tripwire, NOT a behaviour toggle: this set must
# EXACTLY equal the checks the verifier marks CheckKind.critical, or load_policy
# raises PolicyError. Includes the frame checks (action_type_supported,
# invoice_number_match) — they are critical and must pass for ALLOW (D31). There
# is deliberately no `block_if.any_critical_check_failed`: that pre-D3 "any
# critical failure => BLOCK" rule is false — only an agent-fixable critical
# failure BLOCKs; source-invalid arithmetic, currency mismatch, and the frame
# checks all ESCALATE (D3/D31). Encoding it would enforce a lie.
critical_checks:
  - action_type_supported
  - invoice_number_match
  - structural_arithmetic
  - currency_match
  - action_amount_matches_total

retry:
  max_attempts: 2              # agent_fixable blocks only; 1 initial + up to 2 retries = 3 submissions
  # No on_cap_exhausted knob: cap exhaustion ALWAYS routes to a human, hardcoded
  # in retry.py (fail-closed — the loop cannot fix it, so it neither retries
  # forever nor approves). A key whose only other value was already ruled wrong
  # would be inert config, worse than none (D28).
